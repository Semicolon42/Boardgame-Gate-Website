name: Node Continuous Integration

on: 
  pull_request:
    branches: [ master ]

  jobs:
    test_pull_request:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v2
        - uses: actions/setup-node@v1
          with:
            node-version: 24
        - run: pnpm ci
        - run: pnpm test
        - run: pnpm run build